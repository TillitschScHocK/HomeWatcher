services:

  # --- 1. VPN (CyberGhost via OpenVPN) ---------------------------------------
  # Port 1966 is published HERE because nginx shares this container's
  # network stack and cannot publish ports itself (Docker limitation).
  vpn:
    image: dperson/openvpn-client:latest
    container_name: homewatcher-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    environment:
      - ROUTE=${LAN_SUBNET:-192.168.0.0/16}
    volumes:
      - ./vpn/ca.crt:/vpn/ca.crt:ro
      - ./vpn/client.crt:/vpn/client.crt:ro
      - ./vpn/client.key:/vpn/client.key:ro
      - ./vpn/openvpn.ovpn:/vpn/vpn.conf:ro
      - ./vpn/credentials.txt:/vpn/credentials.txt:ro
    ports:
      - "${UI_PORT:-1966}:80"
    healthcheck:
      test: ["CMD-SHELL", "ip route | grep tun0 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0

  # --- 2. IPTV-Restream Frontend (React/Vite) --------------------------------
  iptv_restream_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_STREAM_DELAY: ${VITE_STREAM_DELAY:-18}
        VITE_STREAM_PROXY_DELAY: ${VITE_STREAM_PROXY_DELAY:-30}
        # VITE_BACKEND_URL: http://192.168.1.x:1966
    container_name: homewatcher-frontend
    restart: unless-stopped
    networks:
      - app-network

  # --- 3. IPTV-Restream Backend (Node.js + ffmpeg) ---------------------------
  # Shares the VPN network stack so all outbound stream traffic is tunnelled.
  iptv_restream_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homewatcher-backend
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    volumes:
      - streams_data:/streams
      - channels:/channels
    environment:
      STORAGE_PATH: /streams/
      # BACKEND_URL: http://localhost:5000

  # --- 4. Nginx Reverse Proxy ------------------------------------------------
  # Also shares the VPN network stack. The port is published on the vpn
  # container above – this is required by Docker when using network_mode.
  iptv_restream_nginx:
    image: nginx:alpine
    container_name: homewatcher-nginx
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
      iptv_restream_frontend:
        condition: service_started
      iptv_restream_backend:
        condition: service_started
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - streams_data:/streams

  # --- 5. Watchtower (daily auto-update at 04:00) ----------------------------
  watchtower:
    image: containrrr/watchtower:latest
    container_name: homewatcher-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=${WATCHTOWER_CLEANUP:-true}
      - WATCHTOWER_SCHEDULE=0 0 4 * * *

volumes:
  streams_data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
  channels:

networks:
  app-network:
    driver: bridge
